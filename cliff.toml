# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration

[changelog]
# Template for the changelog header.
header = """
# Changelog

All notable changes to this project will be documented in this file.
Generated by [git-cliff](https://github.com/orhun/git-cliff).
"""

# Template for the changelog body.
# https://keats.github.io/tera/docs/#introduction
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
          {% if commit.breaking %}[**breaking**] {% endif %}\
          {{ commit.message | upper_first }} \
          ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/Asjas/scratchyjs/commit/{{ commit.id }}))\
    {% endfor %}
{% endfor %}\n
"""

# Template for the changelog footer.
footer = ""

# Remove leading and trailing whitespace from templates.
trim = true

[git]
# Parse commits based on https://www.conventionalcommits.org
conventional_commits = true

# Filter out commits that are not conventional.
filter_unconventional = true

# Process each line of a commit as an individual commit.
split_commits = false

# Regex for preprocessing commit messages (link PR/issue references).
commit_preprocessors = [
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/Asjas/scratchyjs/issues/${2}))" },
]

# Regex for parsing and grouping commits.
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->🚀 Features" },
  { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "^doc", group = "<!-- 2 -->📚 Documentation" },
  { message = "^perf", group = "<!-- 3 -->⚡ Performance" },
  { message = "^refactor", group = "<!-- 4 -->🚜 Refactor" },
  { message = "^style", group = "<!-- 5 -->🎨 Styling" },
  { message = "^test", group = "<!-- 6 -->🧪 Testing" },
  # Skip automated release commits so they never appear in the changelog.
  { message = "^chore: release", skip = true },
  { message = "^chore\\(release\\)", skip = true },
  # Skip dependency update commits (usually Renovate / Dependabot).
  { message = "^chore\\(deps", skip = true },
  { message = "^chore", group = "<!-- 7 -->⚙️ Miscellaneous Tasks" },
  { message = "^ci", group = "<!-- 7 -->⚙️ Miscellaneous Tasks" },
  { body = ".*security", group = "<!-- 8 -->🛡️ Security" },
  { message = "^revert", group = "<!-- 9 -->◀️ Revert" },
]

# Prevent breaking changes from being skipped by later parsers.
protect_breaking_commits = false

# Include all commits that match at least one parser (filter_commits = true
# would exclude commits that don't match any parser).
filter_commits = false

# Regex for matching git tags. Matches CalVer tags: v26.3.22-1774181628906
tag_pattern = "v[0-9][0-9]\\.[0-9]+\\.[0-9]+-[0-9]+"

# Regex for tags to skip.
skip_tags = ""

# Regex for tags to ignore entirely.
ignore_tags = ""

# Sort tags topologically.
topo_order = false

# Sort commits within each section from oldest to newest.
sort_commits = "oldest"
