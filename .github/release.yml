# GitHub release note categories
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
#
# These categories control how GitHub groups pull requests in the auto-generated
# release notes UI (the "Generate release notes" button on the Releases page).
# git-cliff is used for the authoritative CHANGELOG.md and release body.

changelog:
  exclude:
    labels:
      - ignore-for-release

  categories:
    - title: "🚀 Features"
      labels:
        - feature
        - enhancement

    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix

    - title: "📚 Documentation"
      labels:
        - documentation
        - docs

    - title: "⚡ Performance"
      labels:
        - performance
        - perf

    - title: "🛡️ Security"
      labels:
        - security

    - title: "🧹 Maintenance"
      labels:
        - chore
        - dependencies
        - maintenance
        - ci
