name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "CHANGELOG.md"
      - "wrangler.toml"
      - "pnpm-lock.yaml"
      - "package.json"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "docs/**"
      - "CHANGELOG.md"
      - "wrangler.toml"
      - "pnpm-lock.yaml"
      - "package.json"
  workflow_run:
    workflows: ["Publish @scratchyjs/* packages"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Build (shared) ──────────────────────────────────────────────────────────
  build:
    if: >
      (github.event_name != 'pull_request' || github.event.action != 'closed')
      && (github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          # Publish pushes the release commit near the end of the job, so use
          # the latest main branch state when this workflow is triggered from
          # the publish workflow completion event.
          ref:
            ${{ github.event_name == 'workflow_run' && 'refs/heads/main' ||
            github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-dist
          path: docs/.vitepress/dist
          retention-days: 1

  # ── Deploy to production (push to main) ────────────────────────────────────
  deploy-production:
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref:
            ${{ github.event_name == 'workflow_run' && 'refs/heads/main' ||
            github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-dist
          path: docs/.vitepress/dist

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

  # ── Deploy PR preview ───────────────────────────────────────────────────────
  deploy-preview:
    if: >
      github.event_name == 'pull_request' && github.event.action != 'closed'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-dist
          path: docs/.vitepress/dist

      - name: Deploy PR preview to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Each PR gets its own named worker so previews are isolated
          command:
            deploy --name scratchyjs-docs-pr-${{
            github.event.pull_request.number }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = '${{ steps.deploy.outputs.deployment-url }}';
            const body = `📚 **Docs preview deployed**\n\n${previewUrl}\n\n_Updates automatically on every push to this PR._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c =>
              c.user?.login === 'github-actions[bot]' &&
              c.body?.includes('Docs preview deployed')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

  # ── Clean up PR preview when PR is closed ──────────────────────────────────
  cleanup-preview:
    if: >
      github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Delete PR preview Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command:
            delete --name scratchyjs-docs-pr-${{
            github.event.pull_request.number }} --force
