name: Benchmarks

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "benchmarks/**"
      - "packages/**"
      - "vitest.bench.config.ts"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [main]
    paths:
      - "benchmarks/**"
      - "packages/**"
      - "vitest.bench.config.ts"
      - "pnpm-lock.yaml"

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run benchmarks
        run: pnpm bench:ci

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: benchmarks/results.json
          retention-days: 30
          if-no-files-found: ignore

  benchmark-report:
    runs-on: ubuntu-latest
    needs: [benchmark]
    if: ${{ github.event_name == 'pull_request' && !cancelled() }}

    permissions:
      contents: read
      pull-requests: write
      actions: read

    steps:
      - name: Download current benchmark results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: benchmark-results
          path: benchmark-results

      - name: Download base benchmark results
        uses: dawidd6/action-download-artifact@v18
        continue-on-error: true
        with:
          workflow: benchmarks.yml
          branch: main
          name: benchmark-results
          path: base-benchmark-results
          if_no_artifact_found: warn
          check_artifacts: true
          search_artifacts: true

      - name: Post benchmark comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // ── helpers ────────────────────────────────────────────────────────
            function fmtHz(hz) {
              if (hz >= 1_000_000) return (hz / 1_000_000).toFixed(2) + ' M';
              if (hz >= 1_000)     return (hz / 1_000).toFixed(1) + ' K';
              return hz.toFixed(0);
            }

            function fmtUs(us) {
              return us < 1 ? us.toFixed(4) : us.toFixed(3);
            }

            function fmtDelta(current, base) {
              const pct = ((current - base) / base) * 100;
              if (Math.abs(pct) < 1) return '`~0%`';
              const sign = pct > 0 ? '+' : '';
              const icon = pct <= -10 ? ' ⚠️' : pct >= 10 ? ' 🚀' : '';
              return `\`${sign}${pct.toFixed(1)}%\`${icon}`;
            }

            // ── load result files ──────────────────────────────────────────────
            const currentPath = 'benchmark-results/results.json';
            const basePath    = 'base-benchmark-results/results.json';

            if (!fs.existsSync(currentPath)) {
              core.warning('No benchmark results artifact found – skipping comment.');
              return;
            }

            const current = JSON.parse(fs.readFileSync(currentPath, 'utf8'));
            const base    = fs.existsSync(basePath)
              ? JSON.parse(fs.readFileSync(basePath, 'utf8'))
              : null;

            // Build a name → hz lookup for the base run
            const baseHz = {};
            if (base) {
              for (const file of base.files) {
                for (const group of file.groups) {
                  for (const b of group.benchmarks) {
                    baseHz[`${group.fullName} > ${b.name}`] = b.hz;
                  }
                }
              }
            }

            // ── build markdown ─────────────────────────────────────────────────
            const hasBase = base !== null;
            const MARKER  = '<!-- scratchyjs-benchmark-report -->';

            const colHeader  = hasBase
              ? '| Suite — Benchmark | ops/sec | mean (µs) | p99 (µs) | ±rme | vs `main` |'
              : '| Suite — Benchmark | ops/sec | mean (µs) | p99 (µs) | ±rme |';
            const colDivider = hasBase
              ? '|---|--:|--:|--:|--:|--:|'
              : '|---|--:|--:|--:|--:|';

            const blocks = [];

            for (const file of current.files) {
              const shortPath = file.filepath.replace(/.*\/benchmarks\//, 'benchmarks/');
              const rows = [];

              for (const group of file.groups) {
                const suite = group.fullName.replace(/^.*> /, '');
                for (const b of group.benchmarks) {
                  const key   = `${group.fullName} > ${b.name}`;
                  const delta = hasBase
                    ? (baseHz[key] !== undefined ? fmtDelta(b.hz, baseHz[key]) : 'n/a')
                    : '';
                  const cells = [
                    `${suite} — ${b.name}`,
                    fmtHz(b.hz),
                    fmtUs(b.mean),
                    fmtUs(b.p99),
                    `±${b.rme.toFixed(2)}%`,
                  ];
                  if (hasBase) cells.push(delta);
                  rows.push(`| ${cells.join(' | ')} |`);
                }
              }

              blocks.push(
                `<details>\n<summary><code>${shortPath}</code></summary>\n\n` +
                `${colHeader}\n${colDivider}\n${rows.join('\n')}\n\n</details>`
              );
            }

            const footer = hasBase
              ? '> 🔬 Compared against the latest benchmark run on `main`. ⚠️ = >10% slower · 🚀 = >10% faster.'
              : '> ℹ️ No base results from `main\` found — delta column omitted on first run.';

            const body = [
              MARKER,
              '## ⚡ Benchmark Results',
              '',
              blocks.join('\n\n'),
              '',
              footer,
            ].join('\n');

            // ── create or update the PR comment ────────────────────────────────
            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
