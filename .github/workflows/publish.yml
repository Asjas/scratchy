name: Publish @scratchyjs/* packages

# Triggered manually via the GitHub Actions UI.
# Use workflow_dispatch to cut a release at the right moment rather than
# publishing on every merge to main.
on:
  workflow_dispatch:

permissions:
  # Push the CalVer version-bump commit, updated CHANGELOG.md, and annotated
  # git tag back to main; also required to create GitHub Releases.
  contents: write

# Only allow one publish run at a time. A second dispatch while a run is in
# progress will wait (not cancel) so no release is silently dropped.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: release

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history needed by git-cliff and for tag pushes

      - name: 📦 Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: ⎔ Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          scope: "@scratchyjs"
          cache: pnpm

      - name: 🔧 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Test
        run: pnpm test

      - name: 🔖 Generate CalVer version (YY.MM.DD-millis)
        id: calver
        run: |
          YY=$(date -u +%y)
          MM=$(date -u +%-m)
          DD=$(date -u +%-d)
          MILLIS=$(date -u +%s%3N) # GNU date only — fine on ubuntu-latest
          VERSION="${YY}.${MM}.${DD}-${MILLIS}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "CalVer: ${VERSION}"

      - name: ✏️ Bump version in all package manifests
        env:
          CALVER_VERSION: ${{ steps.calver.outputs.version }}
        run: |
          for pkg_json in packages/*/package.json; do
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${CALVER_VERSION}\"/" "${pkg_json}"
            name=$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('${pkg_json}','utf8')).name)")
            echo "  ${name} → ${CALVER_VERSION}"
          done

      - name: 🏷️ Commit version bump & sync with main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          HUSKY=0 git commit -m "chore: release v${{ steps.calver.outputs.version }} [skip ci]"
          # Rebase onto main so the final tagged commit includes any concurrent
          # merges. Use -X theirs so that if an earlier publish run already landed
          # a version bump on main, conflicts in package.json are resolved by
          # keeping *our* CalVer version (in git-rebase semantics "theirs" = the
          # commit being replayed, i.e. our version-bump commit).
          git pull --rebase -X theirs origin main

      # git-cliff runs AFTER the rebase so the generated release notes and
      # CHANGELOG.md entry cover exactly the commits that will be tagged —
      # including any that landed on main during this workflow run.
      # orhun/git-cliff-action installs git-cliff under $RUNNER_TEMP for the
      # current job. Later shell steps should invoke that binary explicitly
      # rather than assuming it is available on PATH.
      - name: 📋 Generate release notes
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: >-
            --unreleased --tag v${{ steps.calver.outputs.version }} --strip all
        env:
          # The action writes the generated content to this file.
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: 📝 Update CHANGELOG.md
        env:
          CALVER_VERSION: ${{ steps.calver.outputs.version }}
        run: |
          GIT_CLIFF_BIN="${RUNNER_TEMP}/git-cliff/bin/git-cliff"
          test -x "${GIT_CLIFF_BIN}"
          "${GIT_CLIFF_BIN}" \
            --config cliff.toml \
            --unreleased \
            --tag "v${CALVER_VERSION}" \
            --prepend CHANGELOG.md

      - name: 🏷️ Fold CHANGELOG.md into release commit & create local tag
        run: |
          # Amend the release commit to include CHANGELOG.md so the tag
          # points to a single atomic commit containing both the version
          # bump and the updated changelog.
          # NOTE: We do NOT push here — the push happens only after npm
          # publish succeeds so that a failed publish never leaves orphaned
          # tags or duplicate CHANGELOG entries on main.
          git add CHANGELOG.md
          HUSKY=0 git commit --amend --no-edit
          git tag "v${{ steps.calver.outputs.version }}" \
            -m "Release v${{ steps.calver.outputs.version }} (CalVer)"

      - name: 🚀 Publish all packages to npm
        # Uses a repository secret (NPM_TOKEN) for npm authentication.
        # Make sure NPM_TOKEN has publish rights for @scratchyjs/* packages.
        # This step runs BEFORE the git push so that if publishing fails the
        # version-bump commit and tag are never pushed to main, keeping the repo
        # and CHANGELOG in a clean state for the next attempt.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is missing or empty."
            exit 1
          fi

          for pkg_dir in packages/*/; do
            pkg_json="${pkg_dir}package.json"
            [ -f "${pkg_json}" ] || continue
            is_private=$(node -e "process.stdout.write(String(!!JSON.parse(require('fs').readFileSync('${pkg_json}','utf8')).private))")
            [ "${is_private}" = "true" ] && continue
            name=$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('${pkg_json}','utf8')).name)")
            echo "→ Publishing ${name}..."
            (cd "${pkg_dir}" && npm publish --access public --tag latest)
          done

      - name: 📤 Push release commit & tag to main
        # Only reached if npm publish succeeded. Pushing here (rather than before
        # the publish step) ensures that a failed publish never leaves an orphaned
        # tag or a duplicate CHANGELOG entry on main.
        #
        # A second rebase handles any commits that landed on main while the
        # (potentially slow) npm publish was in progress. Without it a
        # non-fast-forward push would abort the step and leave packages published
        # without a corresponding commit or tag on main.
        # -X theirs keeps our version-bump commit when conflicts arise.
        # The rebase rewrites commit SHAs, so we force-move the local tag to the
        # new HEAD before pushing so --follow-tags sends the correct tag object.
        run: |
          git pull --rebase -X theirs origin main
          git tag -f "v${{ steps.calver.outputs.version }}" \
            -m "Release v${{ steps.calver.outputs.version }} (CalVer)"
          git push origin HEAD:main --follow-tags

      - name: 🎉 Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          CALVER_VERSION: ${{ steps.calver.outputs.version }}
        run: |
          gh release create "v${CALVER_VERSION}" \
            --title "Release v${CALVER_VERSION}" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag
