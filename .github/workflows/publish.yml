name: Publish @scratchyjs/* packages

# Triggered manually via the GitHub Actions UI.
# Use workflow_dispatch to cut a release at the right moment rather than
# publishing on every merge to main.
on:
  workflow_dispatch:

permissions:
  # Push the CalVer version-bump commit, updated CHANGELOG.md, and annotated
  # git tag back to main; also required to create GitHub Releases.
  contents: write
  # Required for both npm OIDC trusted publishing and SLSA provenance attestation.
  # No NPM_TOKEN secret is needed — npm exchanges this OIDC token for a short-lived
  # publish token automatically when the package is configured as a trusted publisher
  # on npmjs.com (https://docs.npmjs.com/trusted-publishers).
  id-token: write

# Only allow one publish run at a time. A second dispatch while a run is in
# progress will wait (not cancel) so no release is silently dropped.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: release

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history needed by git-cliff and for tag pushes

      - name: 📦 Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: ⎔ Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          scope: "@scratchyjs"
          cache: pnpm

      - name: 🔧 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Test
        run: pnpm test

      - name: 🔖 Generate CalVer version (YY.MM.DD-millis)
        id: calver
        run: |
          YY=$(date -u +%y)
          MM=$(date -u +%-m)
          DD=$(date -u +%-d)
          MILLIS=$(date -u +%s%3N) # GNU date only — fine on ubuntu-latest
          VERSION="${YY}.${MM}.${DD}-${MILLIS}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "CalVer: ${VERSION}"

      - name: ✏️ Bump version in all package manifests
        env:
          CALVER_VERSION: ${{ steps.calver.outputs.version }}
        run: |
          for pkg_json in packages/*/package.json; do
            sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${CALVER_VERSION}\"/" "${pkg_json}"
            name=$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('${pkg_json}','utf8')).name)")
            echo "  ${name} → ${CALVER_VERSION}"
          done

      - name: 🏷️ Commit version bump & sync with main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git commit -m "chore: release v${{ steps.calver.outputs.version }} [skip ci]"
          # Rebase onto main so the final tagged commit includes any concurrent
          # merges. Use -X theirs so that if an earlier publish run already landed
          # a version bump on main, conflicts in package.json are resolved by
          # keeping *our* CalVer version (in git-rebase semantics "theirs" = the
          # commit being replayed, i.e. our version-bump commit).
          git pull --rebase -X theirs origin main

      # git-cliff runs AFTER the rebase so the generated release notes and
      # CHANGELOG.md entry cover exactly the commits that will be tagged —
      # including any that landed on main during this workflow run.
      # orhun/git-cliff-action installs git-cliff under $RUNNER_TEMP for the
      # current job. Later shell steps should invoke that binary explicitly
      # rather than assuming it is available on PATH.
      - name: 📋 Generate release notes
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: >-
            --unreleased
            --tag v${{ steps.calver.outputs.version }}
            --strip all
        env:
          # The action writes the generated content to this file.
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: 📝 Update CHANGELOG.md
        env:
          CALVER_VERSION: ${{ steps.calver.outputs.version }}
        run: |
          GIT_CLIFF_BIN="${RUNNER_TEMP}/git-cliff/bin/git-cliff"
          test -x "${GIT_CLIFF_BIN}"
          "${GIT_CLIFF_BIN}" \
            --config cliff.toml \
            --unreleased \
            --tag "v${CALVER_VERSION}" \
            --prepend CHANGELOG.md

      - name: 🏷️ Fold CHANGELOG.md into release commit, tag & push
        env:
          CALVER_VERSION: ${{ steps.calver.outputs.version }}
        run: |
          set -x
          trap 'status=$?; echo "Fold step failed with exit code ${status} at command: ${BASH_COMMAND}"; git status --short; git rev-parse HEAD; git log --oneline --decorate -n 10; git tag --list "v${CALVER_VERSION}"; git ls-remote --heads origin main; git ls-remote --tags origin "refs/tags/v${CALVER_VERSION}" || true; exit ${status}' ERR

          # Print local and remote git state before mutating history so push/tag
          # failures can be diagnosed from the workflow log.
          git status --short
          git rev-parse HEAD
          git log --oneline --decorate -n 5
          git tag --list "v${CALVER_VERSION}"
          git ls-remote --heads origin main
          git ls-remote --tags origin "refs/tags/v${CALVER_VERSION}" || true

          # Amend the release commit to include CHANGELOG.md so the tag
          # points to a single atomic commit containing both the version
          # bump and the updated changelog.
          git add CHANGELOG.md
          git commit --amend --no-edit
          git rev-parse HEAD
          git log --oneline --decorate -n 5

          git tag "v${CALVER_VERSION}" \
            -m "Release v${CALVER_VERSION} (CalVer)"
          git show-ref --tags "v${CALVER_VERSION}"

          git push --verbose origin HEAD:main --follow-tags

      - name: 🚀 Publish all packages to npm
        # npm exchanges the GitHub OIDC token for a short-lived publish token
        # automatically when --provenance is set and the package is configured as a
        # trusted publisher on npmjs.com. No NODE_AUTH_TOKEN secret is required.
        # One-time setup per package on npmjs.com:
        #   Package settings → Publishing → Trusted publishers → Add publisher
        #   Provider: GitHub Actions
        #   Repository: Asjas/scratchyjs
        #   Workflow: publish.yml
        run: |
          for pkg_dir in packages/*/; do
            pkg_json="${pkg_dir}package.json"
            [ -f "${pkg_json}" ] || continue
            is_private=$(node -e "process.stdout.write(String(!!JSON.parse(require('fs').readFileSync('${pkg_json}','utf8')).private))")
            [ "${is_private}" = "true" ] && continue
            name=$(node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('${pkg_json}','utf8')).name)")
            echo "→ Publishing ${name}..."
            (cd "${pkg_dir}" && npm publish --provenance --tag latest)
          done

      - name: 🎉 Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          CALVER_VERSION: ${{ steps.calver.outputs.version }}
        run: |
          gh release create "v${CALVER_VERSION}" \
            --title "Release v${CALVER_VERSION}" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag
