name: Cypress Docs E2E

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "CHANGELOG.md"
      - "cypress/**"
      - "cypress.config.ts"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "CHANGELOG.md"
      - "cypress/**"
      - "cypress.config.ts"

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  cypress-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: pnpm

      - name: Cache Cypress binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            cypress-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build

      - name: Start docs preview server
        run: pnpm docs:preview &
        env:
          PORT: 4173

      - name: Wait for docs preview to be ready
        run: npx wait-on http://localhost:4173 --timeout 30000

      - name: Run Cypress tests
        run: pnpm cy:run:docs --browser chrome
        env:
          CYPRESS_BASE_URL: http://localhost:4173

      - name: Upload Cypress screenshots on failure
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 7
          if-no-files-found: ignore
