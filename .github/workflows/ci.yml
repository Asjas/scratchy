name: CI

on:
  workflow_dispatch: # allow manual triggering of the workflow
  push:
    branches: [main]
    paths-ignore:
      - ".github/instructions/**"
      - ".editorconfig"
      - ".npmrc"
      - "renovate.json"
      - "LICENSE"
      - "docs/**"
      - "AGENTS.md"
      - "IMPLEMENTATION_PLAN.md"
      - "CHANGELOG.md"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check-format-lint-type-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x, 25.x]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Cache ESLint and Prettier
        uses: actions/cache@v5
        with:
          path: .cache
          key: ${{ runner.os }}-lint-cache-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml', 'eslint.config.mjs', '.prettierrc') }}
          restore-keys: |
            ${{ runner.os }}-lint-cache-${{ matrix.node-version }}-
            ${{ runner.os }}-lint-cache-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prettier check
        run: pnpm check-format

      - name: Run ESLint
        run: pnpm lint

      - name: Run TypeScript type check
        run: pnpm typecheck

      - name: Run build
        run: pnpm build

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always() && matrix.node-version == '24.x'
        with:
          name: coverage-node-24
          path: coverage
          retention-days: 14
          if-no-files-found: ignore

  coverage-report:
    runs-on: ubuntu-latest
    needs: [check-format-lint-type-and-build]
    if: ${{ github.event_name == 'pull_request' && !cancelled() }}

    permissions:
      contents: read
      pull-requests: write
      actions: read

    steps:
      - name: Download current coverage
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: coverage-node-24
          path: coverage

      - name: Download base coverage
        uses: dawidd6/action-download-artifact@v18
        continue-on-error: true
        with:
          workflow: ci.yml
          branch: main
          name: coverage-node-24
          path: base-coverage
          if_no_artifact_found: warn
          check_artifacts: true
          search_artifacts: true

      - name: Check coverage file availability
        id: coverage-files
        run: |
          [ -f coverage/coverage-summary.json ] && [ -f coverage/coverage-final.json ] && echo "coverage=true" >> "$GITHUB_OUTPUT" || true
          [ -f base-coverage/coverage-summary.json ] && echo "base-coverage=true" >> "$GITHUB_OUTPUT" || true

      - name: Coverage report
        if: steps.coverage-files.outputs.coverage == 'true'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json
          json-summary-compare-path: ${{ steps.coverage-files.outputs.base-coverage == 'true' && 'base-coverage/coverage-summary.json' || '' }}
