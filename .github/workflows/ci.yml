name: CI

on:
  workflow_dispatch: # allow manual triggering of the workflow
  push:
    branches: [main]
    paths-ignore:
      - ".github/instructions/**"
      - ".editorconfig"
      - ".npmrc"
      - "renovate.json"
      - "LICENSE"
      - "docs/**"
      - "AGENTS.md"
      - "IMPLEMENTATION_PLAN.md"
      - "CHANGELOG.md"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check-format-lint-type-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x, 25.x]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Cache ESLint and Prettier
        uses: actions/cache@v5
        with:
          path: .cache
          key: ${{ runner.os }}-lint-cache-${{ matrix.node-version }}-${{ hashFiles('**/pnpm-lock.yaml', 'eslint.config.mjs', '.prettierrc') }}
          restore-keys: |
            ${{ runner.os }}-lint-cache-${{ matrix.node-version }}-
            ${{ runner.os }}-lint-cache-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prettier check
        run: pnpm check-format

      - name: Run ESLint
        run: pnpm lint

      - name: Run TypeScript type check
        run: pnpm typecheck

      - name: Run build
        run: pnpm build

      - name: Run tests
        run: pnpm test
